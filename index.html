<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'intrus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: #F5F0E8;
    color: #2C2A22;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
  }

  header {
    width: 100%;
    background: #3B6D11;
    color: #fff;
    text-align: center;
    padding: 18px 20px 14px;
  }
  header .surtitle {
    font-size: 12px;
    letter-spacing: .12em;
    text-transform: uppercase;
    opacity: .75;
    font-family: Arial, sans-serif;
    margin-bottom: 4px;
  }
  header h1 {
    font-size: 26px;
    font-weight: normal;
    letter-spacing: .01em;
  }

  .conteneur {
    width: 100%;
    max-width: 500px;
    padding: 0 16px;
  }

  /* Score bar */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0 10px;
    border-bottom: 1px solid #D3CFC4;
    margin-bottom: 18px;
  }
  .score-item {
    text-align: center;
  }
  .score-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: #7A7468;
    font-family: Arial, sans-serif;
    display: block;
    margin-bottom: 2px;
  }
  .score-val {
    font-size: 22px;
    color: #3B6D11;
  }

  /* Niveau */
  .niveau-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .niveau-row label {
    font-size: 15px;
    color: #5F5C52;
    font-family: Arial, sans-serif;
    white-space: nowrap;
  }
  .niveau-row select {
    flex: 1;
    border: 1.5px solid #C8C3B6;
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 15px;
    background: #fff;
    color: #2C2A22;
    font-family: Arial, sans-serif;
    cursor: pointer;
  }

  /* Zone question */
  .zone-question {
    background: #fff;
    border-radius: 12px;
    border: 1.5px solid #D3CFC4;
    padding: 16px 18px;
    font-size: 17px;
    line-height: 1.5;
    margin-bottom: 16px;
    min-height: 60px;
    text-align: center;
    color: #2C2A22;
  }
  .zone-question .theme-label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: #7A7468;
    font-family: Arial, sans-serif;
    margin-bottom: 6px;
  }
  .zone-question.attente {
    color: #7A7468;
    font-size: 15px;
    font-family: Arial, sans-serif;
    padding: 28px 18px;
  }

  /* Grille mots */
  .grille-mots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }

  .btn-mot {
    background: #fff;
    border: 2px solid #C8C3B6;
    border-radius: 12px;
    padding: 18px 10px;
    font-size: 19px;
    font-family: Georgia, serif;
    color: #2C2A22;
    cursor: pointer;
    text-align: center;
    min-height: 62px;
    transition: background .12s, border-color .12s, transform .08s;
    width: 100%;
    line-height: 1.2;
  }
  .btn-mot:hover:not(:disabled) { background: #F0EBE0; border-color: #A89F8E; }
  .btn-mot:active:not(:disabled) { transform: scale(0.96); }
  .btn-mot.choisi   { background: #E6F1FB; border-color: #378ADD; color: #0C447C; }
  .btn-mot.correct  { background: #EAF3DE; border-color: #639922; color: #27500A; }
  .btn-mot.erreur   { background: #FCEBEB; border-color: #E24B4A; color: #791F1F; }
  .btn-mot.revele   { background: #EAF3DE; border-color: #639922; color: #27500A; }
  .btn-mot:disabled { cursor: default; }

  /* Feedback */
  .zone-feedback {
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 16px;
    line-height: 1.5;
    font-family: Arial, sans-serif;
    margin-bottom: 12px;
    display: none;
  }
  .zone-feedback.ok  { background: #EAF3DE; color: #27500A; display: block; }
  .zone-feedback.err { background: #FCEBEB; color: #791F1F; display: block; }

  /* Boutons action */
  .btn-valider {
    background: #3B6D11;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 18px;
    font-size: 18px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    width: 100%;
    cursor: pointer;
    margin-bottom: 10px;
    transition: background .12s, opacity .12s, transform .08s;
  }
  .btn-valider:disabled { opacity: .35; cursor: default; }
  .btn-valider:hover:not(:disabled) { background: #27500A; }
  .btn-valider:active:not(:disabled) { transform: scale(0.98); }

  .btn-nouveau {
    background: transparent;
    color: #5F5C52;
    border: 1.5px solid #C8C3B6;
    border-radius: 12px;
    padding: 14px;
    font-size: 16px;
    font-family: Arial, sans-serif;
    width: 100%;
    cursor: pointer;
    transition: background .12s;
  }
  .btn-nouveau:hover { background: #EDE8DC; }

  footer {
    margin-top: 30px;
    text-align: center;
    font-size: 12px;
    color: #A89F8E;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>

<header>

<div class="conteneur">

  <div class="zone-question attente" id="zone-question">

  <div class="grille-mots" id="grille-mots"></div>

  <div class="zone-feedback" id="zone-feedback"></div>

</div>

<footer>Jeu sans besoin de connexion internet · Atelier Mémoire</footer>

  {theme:"Loisirs créatifs", mots:["tricot","peinture","broderie","jogging","poterie","origami"], intrus:"jogging", explication:"Le jogging est un sport, pas un loisir créatif."},

  // --- NATURE ---
  {theme:"Éléments naturels", mots:["montagne","rivière","forêt","autoroute"], intrus:"autoroute", explication:"L'autoroute est une construction humaine."},
  {theme:"Minéraux et pierres", mots:["granit","marbre","quartz","calcaire","sable","tournesol"], intrus:"tournesol", explication:"Le tournesol est une plante, pas un minéral."},
  {theme:"Planètes du système solaire", mots:["Mars","Vénus","Jupiter","Lune","Saturne","Neptune"], intrus:"Lune", explication:"La Lune est un satellite naturel, pas une planète."},
  {theme:"Météores et astres", mots:["étoile","comète","météorite","nuage","astéroïde","nébuleuse"], intrus:"nuage", explication:"Le nuage est un phénomène atmosphérique terrestre."},

  // --- RELIGION & CULTURE ---
  {theme:"Fêtes françaises", mots:["Noël","Pâques","Toussaint","Halloween"], intrus:"Halloween", explication:"Halloween est une fête d'origine anglo-saxonne, pas une fête traditionnelle française."},
  {theme:"Instruments de l'église", mots:["orgue","cloches","encensoir","trompette","harmonium","cierge"], intrus:"cierge", explication:"Le cierge est un objet liturgique, pas un instrument de musique."},

  // --- DIVERS ---
  {theme:"Chiffres pairs", mots:["2","4","6","7"], intrus:"7", explication:"7 est un chiffre impair."},
  {theme:"Jours de la semaine", mots:["lundi","mercredi","vendredi","mars"], intrus:"mars", explication:"Mars est un mois de l'année, pas un jour de la semaine."},
  {theme:"Matières scolaires", mots:["mathématiques","histoire","géographie","jardinage"], intrus:"jardinage", explication:"Le jardinage n'est pas une matière scolaire classique."},
  {theme:"Monnaies européennes", mots:["euro","franc suisse","couronne danoise","dollar"], intrus:"dollar", explication:"Le dollar est la monnaie des États-Unis, pas d'Europe."},
  {theme:"Langues romanes", mots:["français","espagnol","portugais","roumain","allemand","italien"], intrus:"allemand", explication:"L'allemand est une langue germanique, pas romane."},
  {theme:"Monuments de Paris", mots:["Tour Eiffel","Louvre","Notre-Dame","Colisée"], intrus:"Colisée", explication:"Le Colisée est à Rome, en Italie."},
];

let score = 0;
let parties = 0;
let motChoisi = null;
let intrusIndex = null;
let mots = [];
let enCours = false;
let questionsUtilisees = [];

function melanger(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function nouvelleQuestion() {
  const nb = parseInt(document.getElementById('niveau').value);

  // Pioche une question pas encore utilisée
  let disponibles = QUESTIONS.filter((_, i) => !questionsUtilisees.includes(i));
  if (disponibles.length === 0) {
    questionsUtilisees = [];
    disponibles = [...QUESTIONS];
  }

  // Filtre par nombre de mots compatible
  const compatibles = disponibles.filter(q => q.mots.length >= nb);
  const pool = compatibles.length > 0 ? compatibles : disponibles;
  const idx = QUESTIONS.indexOf(pool[Math.floor(Math.random() * pool.length)]);
  questionsUtilisees.push(idx);
  const q = QUESTIONS[idx];

  // Sélectionne nb mots dont l'intrus
  let motsBase = q.mots.filter(m => m !== q.intrus);
  motsBase = melanger(motsBase).slice(0, nb - 1);
  mots = melanger([...motsBase, q.intrus]);
  intrusIndex = mots.indexOf(q.intrus);

  motChoisi = null;
  enCours = true;

  // Zone question
  const zq = document.getElementById('zone-question');
  zq.className = 'zone-question';
  zq.innerHTML = `<span class="theme-label">Thème : ${q.theme}</span>Quel mot ne va pas avec les autres ?`;

  // Grille mots
  const grille = document.getElementById('grille-mots');
  grille.innerHTML = '';
  mots.forEach((mot, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-mot';
    btn.textContent = mot;
    btn.onclick = () => selectionner(i);
    grille.appendChild(btn);
  });

  document.getElementById('zone-feedback').className = 'zone-feedback';
  document.getElementById('btn-valider').disabled = true;
}

function selectionner(i) {
  if (!enCours) return;
  motChoisi = i;
  document.querySelectorAll('.btn-mot').forEach((b, idx) => {
    b.className = 'btn-mot' + (idx === i ? ' choisi' : '');
  });
  document.getElementById('btn-valider').disabled = false;
}

function valider() {
  if (motChoisi === null || !enCours) return;
  enCours = false;
  parties++;
  document.getElementById('partie-val').textContent = parties;

  const btns = document.querySelectorAll('.btn-mot');
  btns.forEach(b => b.disabled = true);

  const fb = document.getElementById('zone-feedback');
  const q = QUESTIONS.find(q => q.intrus === mots[intrusIndex]);

  if (motChoisi === intrusIndex) {
    score++;
    btns[motChoisi].className = 'btn-mot correct';
    fb.className = 'zone-feedback ok';
    fb.innerHTML = `✔ Bravo ! <strong>${mots[intrusIndex]}</strong> est bien l'intrus.<br><em>${q ? q.explication : ''}</em>`;
  } else {
    btns[motChoisi].className = 'btn-mot erreur';
    btns[intrusIndex].className = 'btn-mot revele';
    fb.className = 'zone-feedback err';
    fb.innerHTML = `✗ Pas tout à fait… L'intrus était <strong>${mots[intrusIndex]}</strong>.<br><em>${q ? q.explication : ''}</em>`;
  }

  document.getElementById('score-val').textContent = score;
  const pct = Math.round((score / parties) * 100);
  document.getElementById('pct-val').textContent = pct + '%';
  document.getElementById('btn-valider').disabled = true;
}
</script>
</body>
</html>
